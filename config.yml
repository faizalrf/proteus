api:
  token: ${SCYLLA_CLOUD_API_TOKEN}
  timeout: 300
  ssl_verify: true
  ssh_key_public: ~/.ssh/id_ed25519.pub
  ssh_key_private: ~/.ssh/id_ed25519
  allow_create: true
  allow_destroy: true
reference_data:
  cloud_data_path: ./cloud-data.json
  api_error_codes_path: ./api_error_codes.tsv
  auto_refresh: false
clusters:
  x1:
    cluster_name: prod-xc-tester
    description: Production X-Cloud cluster on AWS
    cluster_type: x-cloud
    existing_cluster_id: null
    cloud: aws
    region: us-west-2
    scylla_version: 2026.1.3
    api_interface: CQL
    replication_factor: 3
    broadcast_type: PRIVATE
    cidr_block: 172.31.0.0/24
    scaling:
      instance_families:
      - i8g
      instance_types: []
      instance_type_ids: []
      storage:
        min_gb: 1024
        target_utilization: 80
      vcpu:
        min: 6
    vector_search:
      enabled: false
      count: 2
      instance_type: r7g.large
  sc1:
    cluster_name: prod-sc-gcp
    description: Standard Scylla Cloud cluster on GCP
    cluster_type: scylla-cloud
    existing_cluster_id: null
    cloud: aws
    region: us-east-1
    scylla_version: 2026.1.3
    api_interface: CQL
    replication_factor: 3
    broadcast_type: PRIVATE
    cidr_block: 172.31.1.0/24
    node_groups:
    - name: primary
      node_type: i8g.large
      count: 3
  sc2:
    existing_cluster_id: 49508
    cluster_name: gcp-tmp
    cluster_type: x-cloud
    cloud: gcp
    region: asia-southeast1
    scylla_version: 2026.1.3
    api_interface: CQL
    broadcast_type: PRIVATE
    cidr_block: 172.31.0.0/24
    replication_factor: 3
    scaling:
      instance_families:
      - n2d-highmem
      storage:
        min_gb: 1024
        target_utilization: 80
      vcpu:
        min: 12
advanced:
  backup:
    enabled: true
    retention_days: 7
  multi_region:
    enabled: false
  webhooks:
    enabled: false
